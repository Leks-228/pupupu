{% extends 'main/base.html' %}
{% block title %}Новый плейлист{% endblock %}
{% block content %}

<div style="max-width: 480px; margin: 0 auto;">
    <h2 style="margin-bottom: 1.5rem;">Создать новый плейлист</h2>

    <form method="post"
          hx-post="{% url 'create_playlist' %}"
          hx-target="#main-content"
          hx-select="#main-content"
          hx-swap="outerHTML"
          hx-push-url="true"
          style="background: var(--glass-bg);
                 backdrop-filter: blur(20px);
                 -webkit-backdrop-filter: blur(20px);
                 border: 1px solid var(--glass-border);
                 border-radius: 16px;
                 padding: 2rem;
                 box-shadow: 0 8px 20px rgba(0,0,0,0.3);">
        {% csrf_token %}

        <div style="margin-bottom: 1.5rem;">
            <label for="name" style="display: block; margin-bottom: 0.5rem; color: var(--text); font-weight: 500;">
                Название плейлиста
            </label>
            <input type="text"
                   id="name"
                   name="name"
                   required
                   style="width: 100%;
                          padding: 12px 16px;
                          background: rgba(255,255,255,0.06);
                          border: 1px solid var(--glass-border);
                          border-radius: 12px;
                          color: var(--text);
                          font-size: 1rem;
                          outline: none;
                          transition: border 0.2s;"
                   onfocus="this.style.border='1px solid var(--accent)'"
                   onblur="this.style.border='1px solid var(--glass-border)'">
        </div>

        <button type="submit"
                style="background: var(--accent);
                       border: none;
                       color: #fff;
                       padding: 10px 28px;
                       border-radius: 25px;
                       font-weight: 600;
                       cursor: pointer;
                       transition: background 0.2s, transform 0.1s;
                       box-shadow: 0 4px 12px rgba(255,77,109,0.4);"
                onmouseover="this.style.background='var(--accent-glow)'"
                onmouseout="this.style.background='var(--accent)'"
                onmousedown="this.style.transform='scale(0.97)'"
                onmouseup="this.style.transform='scale(1)'">
            Создать
        </button>
    </form>
</div>

{% endblock %}
