{% extends 'main/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Вход{% endblock %}

{% block content %}
<div style="max-width: 440px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 1.5rem;">Вход</h2>

    <div style="background: var(--glass-bg);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid var(--glass-border);
                border-radius: 16px;
                padding: 2rem;
                box-shadow: 0 8px 20px rgba(0,0,0,0.3);">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit"
                    style="background: var(--accent);
                           border: none;
                           color: #fff;
                           padding: 12px;
                           width: 100%;
                           border-radius: 25px;
                           font-weight: 600;
                           cursor: pointer;
                           transition: background 0.2s, transform 0.1s;
                           box-shadow: 0 4px 12px rgba(255,77,109,0.4);
                           margin-top: 0.5rem;"
                    onmouseover="this.style.background='var(--accent-glow)'"
                    onmouseout="this.style.background='var(--accent)'"
                    onmousedown="this.style.transform='scale(0.97)'"
                    onmouseup="this.style.transform='scale(1)'">
                Войти
            </button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-dim);">
            Нет аккаунта?
            <a href="{% url 'register' %}"
               style="color: var(--accent); text-decoration: none; font-weight: 500;"
               onmouseover="this.style.color='#fff'"
               onmouseout="this.style.color='var(--accent)'">
                Зарегистрироваться
            </a>
        </p>
    </div>
</div>

{% endblock %}
