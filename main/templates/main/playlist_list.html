<div style="background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            color: var(--text);">
    <!-- Заголовок модалки -->
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid var(--glass-border);">
        <h5 style="margin: 0;">Добавить в плейлист</h5>
        <button type="button" data-bs-dismiss="modal" aria-label="Закрыть"
                style="background: none; border: none; color: var(--text-dim); font-size: 1.5rem; cursor: pointer; line-height: 1; padding: 0; transition: color 0.2s;"
                onmouseover="this.style.color='#fff'"
                onmouseout="this.style.color='var(--text-dim)'">&times;</button>
    </div>

    <!-- Тело -->
    <div style="padding: 1.5rem;">
        {% if playlists %}
            <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem;">
                {% for playlist in playlists %}
                    <button style="text-align: left;
                                   background: rgba(255,255,255,0.03);
                                   border: 1px solid rgba(255,255,255,0.06);
                                   color: var(--text);
                                   padding: 12px 16px;
                                   border-radius: 10px;
                                   cursor: pointer;
                                   transition: background 0.2s, transform 0.2s;"
                            hx-post="{% url 'add_to_playlist' track_id %}"
                            hx-vals='{"playlist_id": "{{ playlist.id }}"}'
                            hx-swap="none"
                            onmouseover="this.style.background='rgba(255,255,255,0.06)'; this.style.transform='translateX(4px)';"
                            onmouseout="this.style.background='rgba(255,255,255,0.03)'; this.style.transform='';">
                        {{ playlist.name }}
                    </button>
                {% endfor %}
            </div>
            <a href="{% url 'create_playlist' %}"
               hx-get="{% url 'create_playlist' %}"
               hx-target="#main-content"
               hx-push-url="true"
               data-bs-dismiss="modal"
               style="display: block; text-align: center;
                      background: transparent;
                      border: 1px solid var(--accent);
                      color: var(--accent);
                      padding: 10px;
                      border-radius: 20px;
                      text-decoration: none;
                      font-weight: 500;
                      transition: 0.2s;"
               onmouseover="this.style.background='var(--accent)'; this.style.color='#fff';"
               onmouseout="this.style.background='transparent'; this.style.color='var(--accent)';">
                + Создать новый плейлист
            </a>
        {% else %}
            <p style="color: var(--text-dim); text-align: center; margin-bottom: 1.5rem;">У вас пока нет плейлистов.</p>
            <a href="{% url 'create_playlist' %}"
               hx-get="{% url 'create_playlist' %}"
               hx-target="#main-content"
               hx-push-url="true"
               data-bs-dismiss="modal"
               style="display: block; text-align: center;
                      background: var(--accent);
                      color: #fff;
                      padding: 10px;
                      border-radius: 20px;
                      text-decoration: none;
                      font-weight: 500;
                      transition: background 0.2s;
                      box-shadow: 0 4px 12px rgba(255,77,109,0.4);"
               onmouseover="this.style.background='var(--accent-glow)'"
               onmouseout="this.style.background='var(--accent)'">
                Создать первый плейлист
            </a>
        {% endif %}
    </div>

    <!-- Футер -->
    <div style="padding: 1rem 1.5rem; border-top: 1px solid var(--glass-border); display: flex; justify-content: flex-end;">
        <button type="button" data-bs-dismiss="modal"
                style="background: transparent;
                       border: 1px solid var(--glass-border);
                       color: var(--text-dim);
                       padding: 8px 20px;
                       border-radius: 20px;
                       cursor: pointer;
                       font-weight: 500;
                       transition: 0.2s;"
                onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#fff';"
                onmouseout="this.style.background='transparent'; this.style.color='var(--text-dim)';">
            Отмена
        </button>
    </div>
</div>
