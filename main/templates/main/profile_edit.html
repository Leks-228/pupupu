{% extends 'main/base.html' %}
{% block title %}Редактировать профиль{% endblock %}
{% block content %}

<div style="max-width: 560px; margin: 0 auto;">
    <h2 style="margin-bottom: 1.5rem;">Редактировать профиль</h2>

    <form method="post" enctype="multipart/form-data"
          hx-post="{% url 'profile_edit' %}"
          hx-target="#main-content"
          hx-select="#main-content"
          hx-swap="outerHTML"
          hx-push-url="true"
          style="background: var(--glass-bg);
                 backdrop-filter: blur(20px);
                 -webkit-backdrop-filter: blur(20px);
                 border: 1px solid var(--glass-border);
                 border-radius: 16px;
                 padding: 2rem;
                 box-shadow: 0 8px 20px rgba(0,0,0,0.3);">
        {% csrf_token %}

        <div style="margin-bottom: 1.5rem;">
            <h5 style="margin-bottom: 1rem; color: var(--text);">Данные пользователя</h5>
            <div style="color: var(--text);">
                {{ user_form.as_p }}
            </div>
        </div>

        <div style="margin-bottom: 1.5rem;">
            <h5 style="margin-bottom: 1rem; color: var(--text);">Профиль</h5>
            <div style="color: var(--text);">
                {{ profile_form.as_p }}
            </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 0.5rem;">
            <button type="submit"
                    style="background: var(--accent);
                           border: none;
                           color: #fff;
                           padding: 10px 24px;
                           border-radius: 25px;
                           font-weight: 600;
                           cursor: pointer;
                           transition: background 0.2s, transform 0.1s;
                           box-shadow: 0 4px 12px rgba(255,77,109,0.4);"
                    onmouseover="this.style.background='var(--accent-glow)'"
                    onmouseout="this.style.background='var(--accent)'"
                    onmousedown="this.style.transform='scale(0.97)'"
                    onmouseup="this.style.transform='scale(1)'">
                Сохранить
            </button>

            <a href="{% url 'profile' %}"
               hx-get="{% url 'profile' %}"
               hx-target="#main-content"
               hx-select="#main-content"
               hx-swap="outerHTML"
               hx-push-url="true"
               style="background: transparent;
                      border: 1px solid var(--glass-border);
                      color: var(--text-dim);
                      padding: 10px 24px;
                      border-radius: 25px;
                      text-decoration: none;
                      font-weight: 500;
                      transition: 0.2s;
                      display: inline-flex;
                      align-items: center;"
               onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#fff';"
               onmouseout="this.style.background='transparent'; this.style.color='var(--text-dim)';">
                Отмена
            </a>
        </div>
    </form>
</div>

{% endblock %}
